crm_project:
  outputs:
    dev:
      type: clickhouse
      host: crm_clickhouse
      port: 8123
      user: "{{ env_var('CH_USER') }}"
      password: "{{ env_var('CH_PASSWORD') }}"
      schema: crm_analytics     # This is where dbt will build your final tables
      secure: False
      verify: False
      connect_timeout: 10
  target: dev